name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src
      - name: Pytest
        run: uv run pytest
